name: Deploy to Fly.io

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      depot:
        description: "Use Depot for builds"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  check-backend-changes:
    name: Check Backend Changes
    runs-on: ubuntu-latest
    outputs:
      backend-changed: ${{ steps.filter.outputs.backend }}
      frontend-changed: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'valo-mapper-api/**'
              - '.github/workflows/deploy.yml'
            frontend:
              - 'valo-mapper/**'
              - '.github/workflows/deploy.yml'

  deploy-backend:
    name: Deploy Backend to Fly.io
    runs-on: ubuntu-latest
    needs: [check-backend-changes]
    if: ${{ needs.check-backend-changes.outputs.backend-changed == 'true' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy Backend
        working-directory: ./valo-mapper-api
        run: |
          DEPOT_FLAG=""
          if [ "${{ inputs.depot }}" == "false" ]; then
            DEPOT_FLAG="--depot=false"
          fi
          flyctl deploy --remote-only $DEPOT_FLAG
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-frontend:
    name: Deploy Frontend to Fly.io
    runs-on: ubuntu-latest
    needs: [check-backend-changes, deploy-backend]
    if: |
      always() &&
      (needs.check-backend-changes.outputs.frontend-changed == 'true' || github.event_name == 'workflow_dispatch') &&
      (needs.deploy-backend.result == 'success' || needs.deploy-backend.result == 'skipped')

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy Frontend
        working-directory: ./valo-mapper
        run: |
          DEPOT_FLAG=""
          if [ "${{ inputs.depot }}" == "false" ]; then
            DEPOT_FLAG="--depot=false"
          fi
          flyctl deploy --remote-only $DEPOT_FLAG \
            --build-arg NEXT_PUBLIC_FIREBASE_API_KEY="${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN="${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_PROJECT_ID="${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}" \
            --build-arg API_URL="https://valomapper-api.fly.dev/api" \
            --build-arg NEXT_PUBLIC_WS_URL="wss://valomapper-api.fly.dev" \
            --build-arg NEXT_PUBLIC_RSO_CLIENT_ID="${{ secrets.NEXT_PUBLIC_RSO_CLIENT_ID }}" \
            --build-arg NEXT_PUBLIC_RSO_REDIRECT_URI="${{ secrets.NEXT_PUBLIC_RSO_REDIRECT_URI }}"

        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
