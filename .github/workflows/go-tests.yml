name: Go Backend Tests

on:
  push:
    branches: [main, develop]
    paths:
      - "valo-mapper-api/**"
      - ".github/workflows/go-tests.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "valo-mapper-api/**"
      - ".github/workflows/go-tests.yml"

jobs:
  test:
    name: Test Go Backend
    runs-on: ubuntu-latest

    # PostgreSQL service container
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: valomapper_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    defaults:
      run:
        working-directory: ./valo-mapper-api

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: valo-mapper-api/go.sum

      - name: Install dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432 -U postgres; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done

      - name: Run database migrations
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: valomapper_test
        run: |
          go run db/migrations.go || echo "Migrations completed or skipped"

      - name: Create mock Firebase credentials
        run: |
          echo '{"type":"service_account","project_id":"test"}' > serviceAccountKey.json

      - name: Run unit tests
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: valomapper_test
          GOOGLE_APPLICATION_CREDENTIALS: ./serviceAccountKey.json
        run: go test -v -short -race -coverprofile=coverage-unit.txt -covermode=atomic ./...

      - name: Run integration tests
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: valomapper_test
          GOOGLE_APPLICATION_CREDENTIALS: ./serviceAccountKey.json
        run: go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./valo-mapper-api/coverage.txt
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false

      - name: Generate coverage report
        run: go tool cover -html=coverage.txt -o coverage.html

      - name: Upload coverage report artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: valo-mapper-api/coverage.html

  lint:
    name: Lint Go Code
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./valo-mapper-api

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: valo-mapper-api/go.sum

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          working-directory: valo-mapper-api
          args: --timeout=5m

  build:
    name: Build Go Backend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./valo-mapper-api

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: valo-mapper-api/go.sum

      - name: Build application
        run: go build -v -o bin/valo-mapper-api .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: valo-mapper-api-binary
          path: valo-mapper-api/bin/valo-mapper-api
