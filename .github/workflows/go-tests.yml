name: Go Backend Tests

on:
  push:
    branches: [main, develop]
    paths:
      - "valo-mapper-api/**"
      - ".github/workflows/go-tests.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "valo-mapper-api/**"
      - ".github/workflows/go-tests.yml"

jobs:
  test:
    name: Test Go Backend
    runs-on: ubuntu-latest

    # PostgreSQL service container
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: valomapper_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    defaults:
      run:
        working-directory: ./valo-mapper-api

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache-dependency-path: valo-mapper-api/go.sum

      - name: Install dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432 -U postgres; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done

      - name: Run database migrations
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: valomapper_test
        run: |
          go run db/migrations.go || echo "Migrations completed or skipped"

      - name: Run unit tests
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: valomapper_test
          GOOGLE_APPLICATION_CREDENTIALS: '{"type":"service_account","project_id":"test"}'
        run: go test -v -short -race -coverprofile=coverage-unit.txt -covermode=atomic ./...

      - name: Run integration tests
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: valomapper_test
          GOOGLE_APPLICATION_CREDENTIALS: '{"type":"service_account","project_id":"test"}'
        run: go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Generate coverage report
        run: go tool cover -html=coverage.txt -o coverage.html

      - name: Upload coverage report artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: valo-mapper-api/coverage.html

  lint:
    name: Lint Go Code
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./valo-mapper-api

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache-dependency-path: valo-mapper-api/go.sum

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: Run golangci-lint
        run: golangci-lint run --timeout=5m

  swagger-drift-check:
    name: Swagger Drift Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./valo-mapper-api

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache-dependency-path: valo-mapper-api/go.sum

      - name: Install swag CLI
        run: go install github.com/swaggo/swag/cmd/swag@v1.16.6

      - name: Regenerate Swagger docs
        run: |
          swag init -g main.go -o docs

      - name: Verify generated docs are committed
        run: |
          git diff --exit-code -- docs/docs.go docs/swagger.json docs/swagger.yaml

  build:
    name: Build Go Backend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./valo-mapper-api

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache-dependency-path: valo-mapper-api/go.sum

      - name: Build application
        run: go build -v -o bin/valo-mapper-api .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: valo-mapper-api-binary
          path: valo-mapper-api/bin/valo-mapper-api
