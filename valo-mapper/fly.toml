# fly.toml for ValoMapper Frontend (Next.js)
app = 'valomapper'
primary_region = 'yyz'

[build]
  dockerfile = "Dockerfile"
  [build.args]
    API_URL = "https://api.valomapper.com/api"
    NEXT_PUBLIC_WS_URL = "wss://api.valomapper.com"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1

# Environment variables
[env]
  NODE_ENV = "production"
  PORT = "3000"
  API_URL = "https://api.valomapper.com/api"
  NEXT_PUBLIC_WS_URL = "wss://api.valomapper.com"
  NEXT_PUBLIC_RSO_CLIENT_ID = "9e46a29a-4596-4aa4-933a-7acb53a03f1b"
  NEXT_PUBLIC_RSO_REDIRECT_URI = "https://valomapper.com/api/auth/rso/callback"
  NEXT_PUBLIC_APP_URL = "https://valomapper.com"
