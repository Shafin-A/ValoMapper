# fly.toml for ValoMapper API (Go)
app = 'valomapper-api'
primary_region = 'yyz'

[build]
  dockerfile = "Dockerfile"
  build-target = ""

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[http_service.concurrency]
  type = "connections"
  hard_limit = 25
  soft_limit = 20

[[http_service.checks]]
  interval = "10s"
  timeout = "5s"
  grace_period = "60s"
  method = "GET"
  path = "/health"

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1

[env]
  # CORS configuration
  ALLOWED_ORIGINS = "https://valomapper.com,https://www.valomapper.com"
